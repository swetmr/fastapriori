name: Build & Publish to PyPI

on:
  release:
    types: [published]
  workflow_dispatch:       # manual trigger -> publishes to TestPyPI

permissions:
  contents: read

jobs:
  # --- Build platform wheels (Rust compiled) ---
  build-wheels:
    name: Build wheels (${{ matrix.os }}, ${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux x86_64
          - os: ubuntu-latest
            target: x86_64
            pythons-nl: |-
              3.9
              3.10
              3.11
              3.12
              3.13
            pythons-sp: "3.9 3.10 3.11 3.12 3.13"
          # Linux aarch64 (cross-compiled; manylinux container ships its own pythons)
          - os: ubuntu-latest
            target: aarch64
            pythons-nl: |-
              3.10
              3.11
              3.12
              3.13
            pythons-sp: "3.10 3.11 3.12 3.13"
          # macOS Apple Silicon — no arm64 build of CPython 3.9 in actions/setup-python.
          # (macOS Intel / macos-13 dropped: GitHub-hosted Intel runners have long queue
          # times and Apple Silicon has been the default since 2020. Intel users fall
          # through to the sdist.)
          - os: macos-14
            target: aarch64
            pythons-nl: |-
              3.10
              3.11
              3.12
              3.13
            pythons-sp: "3.10 3.11 3.12 3.13"
          # Windows x86_64
          - os: windows-latest
            target: x64
            pythons-nl: |-
              3.9
              3.10
              3.11
              3.12
              3.13
            pythons-sp: "3.9 3.10 3.11 3.12 3.13"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          # setup-python wants newline-separated
          python-version: ${{ matrix.pythons-nl }}

      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          # Explicit --interpreter avoids the runner's pre-installed Python 3.14
          # (newer than PyO3 0.23's max supported 3.13). When PyO3 is bumped to
          # 0.25+, this can switch back to --find-interpreter.
          args: --release --out dist --interpreter ${{ matrix.pythons-sp }}
          manylinux: auto

      - uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}-${{ matrix.target }}
          path: dist/*.whl

  # --- Build sdist (pure Python fallback) ---
  build-sdist:
    name: Build sdist
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build sdist
        run: |
          pip install build
          python -m build --sdist --outdir dist/

      - uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist/*.tar.gz

  # --- Publish to TestPyPI (manual trigger only) ---
  publish-testpypi:
    name: Publish to TestPyPI
    if: github.event_name == 'workflow_dispatch'
    needs: [build-wheels, build-sdist]
    runs-on: ubuntu-latest
    environment: testpypi
    permissions:
      id-token: write       # trusted publishing
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist/
          merge-multiple: true

      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/

  # --- Publish to PyPI (only on a published GitHub Release) ---
  publish-pypi:
    name: Publish to PyPI
    if: github.event_name == 'release'
    needs: [build-wheels, build-sdist]
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write       # trusted publishing
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist/
          merge-multiple: true

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
